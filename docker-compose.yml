services:
  lightnvr:
    build:
      context: .
      pull: true
    container_name: lightnvr
    restart: unless-stopped
    # For same-LAN camera and local WebRTC visibility in production, use host mode.
    # Uncomment only if you're comfortable exposing all host ports used by the app.
    # network_mode: host
    ports:
      - "8080:8080"     # Web UI
      - "8554:8554"     # RTSP
      - "8555:8555"     # WebRTC TCP
      - "8555:8555/udp" # WebRTC UDP
      - "1984:1984"     # go2rtc API
    volumes:
      # Only mount what needs persistence
      # DO NOT mount /var/lib/lightnvr directly - it will overwrite web assets!
      - ./config:/etc/lightnvr
      - ./data:/var/lib/lightnvr/data
    environment:
      # Timezone configuration
      - TZ=UTC  # Change to your timezone (e.g., America/New_York, Europe/London)

      # Single-network (LAN) deployments:
      # Set this to your server LAN IP so go2rtc announces the reachable host.
      # - LIGHTNVR_GO2RTC_EXTERNAL_IP=192.168.1.100
      # Optional: pin LAN subnet used for auto-detected WebRTC candidates
      # If set, go2rtc will prefer the local IP in this CIDR.
      # - LIGHTNVR_GO2RTC_PREFERRED_NETWORK=192.168.1.0/24
      # You can also set LIGHTNVR_ONVIF_NETWORK=192.168.1.0/24 to reuse same value.
      # Keep STUN off for pure same-network use, or on for WAN/inbound firewall/NAT.
      # - LIGHTNVR_GO2RTC_STUN_ENABLED=false

      # go2rtc configuration persistence
      # Set to 'false' to let go2rtc regenerate config on each restart
      - GO2RTC_CONFIG_PERSIST=true

      # Auto-initialize configuration files on first run
      - LIGHTNVR_AUTO_INIT=true

      # ONVIF camera discovery network (for containers)
      # Uncomment and set to your camera network in CIDR notation
      # Example: 192.168.1.0/24 for cameras on 192.168.1.x network
      # - LIGHTNVR_ONVIF_NETWORK=192.168.82.0/24

    networks:
      - lightnvr

networks:
  lightnvr:
    driver: bridge
